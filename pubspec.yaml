name: ai_resume_builder
description: AI Resume Builder - Flutter Material 3 app with Firebase and PDF export.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  http: ^1.2.2
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  google_fonts: ^6.2.1
  provider: ^6.1.2
  pdf: ^3.11.1
  printing: ^5.13.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true

  image_path: "assets/icon/logo.jpeg"

  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/logo.jpeg"
  